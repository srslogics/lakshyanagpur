services:
  - type: web
    name: lakshya-erp
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && cd backend && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
