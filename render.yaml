services:
  - type: web
    name: lakshya-erp
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SEED_DEMO_DATA
        value: false
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
