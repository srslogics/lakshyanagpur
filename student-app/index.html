<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    if (window.location.protocol === "file:") {
      window.location.replace("http://127.0.0.1:8000/student-app/" + window.location.search + window.location.hash);
    }
  </script>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#171a4b">
  <meta name="description" content="Lakshya student portal for classes, assignments, attendance, notices and fees.">
  <meta property="og:title" content="Lakshya Student">
  <meta property="og:description" content="Classes, assignments, attendance and fee records in one secure student portal.">
  <meta property="og:image" content="../share-card.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Lakshya Student</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="icon" href="../pwa-icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../portal-shared.css?v=2">
  <link rel="stylesheet" href="./styles.css?v=6">
  <link rel="stylesheet" href="../auth-shared.css?v=5">
</head>
<body>
  <a class="skip-link" href="#student-main">Skip to content</a>
  <div class="boot-screen" id="boot-screen" aria-label="Loading Lakshya Student">
    <img src="../lakshya-logo.png" width="1536" height="1024" alt="Lakshya">
    <span class="boot-spinner" aria-hidden="true"></span>
  </div>

  <section class="login-screen hidden" id="login-screen" aria-labelledby="login-title">
    <div class="login-brand">
      <img src="../lakshya-logo.png" width="1536" height="1024" alt="Lakshya">
      <span>Student portal</span>
    </div>
    <div class="login-card">
      <div class="login-form-wrap">
        <p class="eyebrow">STUDENT ACCESS</p>
        <h1 id="login-title">Sign in</h1>
        <form id="login-form">
          <label><span>Email address</span><input id="login-email" name="email" type="email" autocomplete="username" inputmode="email" placeholder="student@lakshya.edu" required></label>
          <label><span>Password</span><span class="password-field"><input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" minlength="8" required><button id="password-toggle" type="button" aria-label="Show password"><span data-icon="eye"></span></button></span><small class="field-help">Use at least 8 characters.</small></label>
          <div class="form-error hidden" id="login-error" role="alert"></div>
          <button class="primary-button" id="login-button" type="submit">Sign in <span data-icon="arrow"></span></button>
        </form>
      </div>
    </div>
  </section>

  <div class="portal-shell student-shell hidden" id="student-shell">
    <aside class="portal-sidebar" aria-label="Student portal">
      <a class="sidebar-brand" href="#home" data-view="home" aria-label="Lakshya Student home">
        <img src="../lakshya-logo.png" width="1536" height="1024" alt="Lakshya">
        <span><strong>Student</strong><small>Learning portal</small></span>
      </a>
      <nav class="sidebar-nav" aria-label="Student navigation">
        <button class="active" type="button" data-view="home" aria-current="page"><span data-icon="home"></span><em>Home</em></button>
        <button type="button" data-view="schedule"><span data-icon="calendar"></span><em>Schedule</em></button>
        <button type="button" data-view="assignments"><span data-icon="book"></span><em>Assignments</em><i id="sidebar-assignment-badge" class="nav-badge hidden">0</i></button>
        <button type="button" data-view="attendance"><span data-icon="check"></span><em>Attendance</em></button>
        <button type="button" data-view="more"><span data-icon="more"></span><em>Account</em></button>
      </nav>
      <div class="sidebar-account">
        <span class="sidebar-avatar" id="sidebar-avatar">LS</span>
        <span><strong id="sidebar-name">Student</strong><small id="sidebar-meta">Student account</small></span>
        <button id="sidebar-signout" type="button" aria-label="Sign out"><span data-icon="logout"></span></button>
      </div>
    </aside>

    <header class="app-header">
      <a class="mini-brand" href="#home" aria-label="Lakshya student home"><img src="../lakshya-logo.png" width="1536" height="1024" alt=""></a>
      <div><span id="header-kicker">Student portal</span><strong id="header-title">Home</strong></div>
      <button class="avatar-button" id="profile-button" type="button" aria-label="Open profile"><span id="header-avatar">LS</span></button>
    </header>

    <main id="student-main" tabindex="-1">
      <section class="portal-view active" id="home" aria-labelledby="home-heading">
        <article class="welcome-card">
          <div><p id="today-label"></p><h1 id="home-heading">Hello, <span id="student-first-name">Student</span></h1><p id="student-program"></p></div>
          <div class="welcome-mark" data-icon="spark"></div>
        </article>
        <div class="summary-strip" id="summary-strip"></div>
        <div class="dashboard-grid">
          <section class="content-block next-panel"><div class="section-head"><h2>Next class</h2><button type="button" data-go="schedule">View schedule</button></div><div id="next-class"></div></section>
          <section class="content-block work-panel"><div class="section-head"><h2>Assignments</h2><button type="button" data-go="assignments">View all</button></div><div class="stack-list" id="home-assignments"></div></section>
          <section class="content-block notice-panel"><div class="section-head"><h2>Latest notice</h2><button type="button" data-go="more">View all</button></div><div id="latest-notice"></div></section>
        </div>
      </section>

      <section class="portal-view" id="schedule" aria-labelledby="schedule-heading"><div class="view-heading"><p class="eyebrow">CLASSES</p><h1 id="schedule-heading">Schedule</h1></div><div class="date-filter" id="schedule-dates"></div><div class="timeline" id="schedule-list"></div></section>
      <section class="portal-view" id="assignments" aria-labelledby="assignments-heading"><div class="view-heading"><p class="eyebrow">ACADEMICS</p><h1 id="assignments-heading">Assignments</h1></div><div class="filter-pills" aria-label="Assignment filter"><button class="active" data-assignment-filter="open" type="button" aria-pressed="true">Open</button><button data-assignment-filter="all" type="button" aria-pressed="false">All</button></div><div class="assignment-grid" id="assignment-list"></div></section>
      <section class="portal-view" id="attendance" aria-labelledby="attendance-heading"><div class="view-heading"><p class="eyebrow">PRESENCE</p><h1 id="attendance-heading">Attendance</h1></div><article class="attendance-hero" id="attendance-hero"></article><div class="stack-list" id="attendance-list"></div></section>
      <section class="portal-view" id="more" aria-labelledby="more-heading"><div class="view-heading"><p class="eyebrow">ACCOUNT</p><h1 id="more-heading">More</h1></div><article class="profile-card" id="profile-card"></article><section class="content-block fees-block"><div class="section-head"><h2>Fees</h2></div><div id="fee-summary"></div></section><section class="content-block"><div class="section-head"><h2>Notices</h2></div><div class="notice-list" id="notice-list"></div></section><button class="signout-button" id="signout-button" type="button"><span data-icon="logout"></span>Sign out</button></section>
    </main>

    <nav class="bottom-nav" aria-label="Student navigation">
      <button class="active" type="button" data-view="home" aria-current="page"><span data-icon="home"></span><em>Home</em></button>
      <button type="button" data-view="schedule"><span data-icon="calendar"></span><em>Schedule</em></button>
      <button type="button" data-view="assignments"><span data-icon="book"></span><em>Work</em><i id="assignment-badge" class="hidden">0</i></button>
      <button type="button" data-view="attendance"><span data-icon="check"></span><em>Attendance</em></button>
      <button type="button" data-view="more"><span data-icon="more"></span><em>More</em></button>
    </nav>
  </div>

  <div class="toast-region" id="toast-region" aria-live="polite"></div>
  <script src="./app.js?v=5" defer></script>
</body>
</html>
